<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World 2</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        background: #f4f7fb;
        color: #1f2937;
      }

      main {
        width: min(90vw, 560px);
        padding: 2.5rem 2rem;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        box-shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: 1.05rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, World! 2</h1>
      <p>This static site is deployed with AWS S3 website hosting.</p>
    </main>
  </body>
</html>
